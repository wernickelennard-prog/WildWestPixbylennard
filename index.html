<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild West Sheriff - Sand & Kakteen</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
class Overworld extends Phaser.Scene {
    constructor() {
        super('Overworld');
    }

    preload() {
        // Deine neuen Assets laden
        this.load.image('sheriff', 'Sheriff.png');
        this.load.image('sand', 'Sand.png'); 
        this.load.image('kaktus', 'Kaktus.png');
    }

    create() {
        // 1. BODEN (TileSprite wiederholt deine Sand.png Grafik)
        // Wir machen die Fläche etwas größer als den Screen
        this.background = this.add.tileSprite(180, 320, 360, 640, 'sand');
        // Damit der kleine Sand-Pixel-Block nicht verschwommen wirkt:
        this.background.setTileScale(2); 

        // 2. HINDERNISSE (Kaktus-Gruppe)
        this.obstacles = this.physics.add.staticGroup();

        // Wir verteilen ein paar deiner Kakteen in der Welt
        this.obstacles.create(80, 150, 'kaktus').setScale(2).refreshBody();
        this.obstacles.create(280, 200, 'kaktus').setScale(2.5).refreshBody();
        this.obstacles.create(180, 500, 'kaktus').setScale(2).refreshBody();

        // 3. DER SHERIFF
        this.player = this.physics.add.sprite(180, 320, 'sheriff').setScale(0.15);
        this.player.setCollideWorldBounds(true);

        // Hitbox für die Füße (Präzises Laufen zwischen Kakteen)
        this.player.body.setSize(this.player.width * 0.5, this.player.height * 0.3);
        this.player.body.setOffset(this.player.width * 0.25, this.player.height * 0.7);

        // 4. KOLLISION: Sheriff stößt gegen Kakteen
        this.physics.add.collider(this.player, this.obstacles);

        // Bewegungs-Logik
        this.targetPoint = new Phaser.Math.Vector2(180, 320);

        // 5. STEUERUNG (Click-to-Move)
        this.input.on('pointerdown', (pointer) => {
            this.targetPoint.x = pointer.x;
            this.targetPoint.y = pointer.y;
            this.physics.moveToObject(this.player, this.targetPoint, 180);
        });

        // Dialog-Box (für später)
        this.dialogText = this.add.text(20, 580, "", { 
            fontSize: '14px', fill: '#fff', backgroundColor: '#000', padding: { x: 5, y: 5 }
        }).setAlpha(0).setDepth(2000);
    }

    update() {
        // Stoppen wenn Ziel erreicht
        let distance = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.targetPoint.x, this.targetPoint.y);
        if (this.player.body.speed > 0 && distance < 7) {
            this.player.body.reset(this.targetPoint.x, this.targetPoint.y);
        }

        // TIEFEN-SORTIERUNG: Wer weiter unten ist, steht "vor" dem anderen
        this.player.setDepth(this.player.y);
        this.obstacles.getChildren().forEach(kaktus => {
            kaktus.setDepth(kaktus.y);
        });
    }
}

const config = {
    type: Phaser.AUTO,
    width: 360,
    height: 640,
    physics: {
        default: 'arcade',
        arcade: { debug: false } // Auf true stellen, um die lila Hitboxen zu sehen
    },
    scene: [Overworld],
    pixelArt: true // Behält die scharfen Pixelkanten bei
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
