<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheriff Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
class Overworld extends Phaser.Scene {
    constructor() { super('Overworld'); }

    preload() {
        // FIX: Wir laden die Bilder als einfache Images, damit sie NICHT zerschnitten werden.
        this.load.image('s_v', 'Sheriff_spritesheet-vorne.png');
        this.load.image('s_h', 'Sheriff_spritesheet-hinten.png');
        this.load.image('s_r', 'Sheriff_spritesheet-rechts.png');
        this.load.image('s_l', 'Sheriff-spritesheet-links.png');

        this.load.image('sand', 'Sand.png'); 
        this.load.image('bullet', 'Bullet.png');
        this.load.image('k1', 'Kaktus-.png'); 
        this.load.image('k2', 'Kaktus_anderer_art.png');
        this.load.image('k3', 'Kaktus-Kugel.png');
    }

    create() {
        const worldSize = 2000;
        this.physics.world.setBounds(0, 0, worldSize, worldSize);
        this.add.tileSprite(worldSize/2, worldSize/2, worldSize, worldSize, 'sand').setTileScale(2);

        this.obstacles = this.physics.add.staticGroup();
        const kTypes = ['k1', 'k2', 'k3'];

        // Kakteen-Platzierung mit SCHALER Hitbox
        for(let i = 0; i < 15; i++) {
            let x = Phaser.Math.Between(300, 1700);
            let y = Phaser.Math.Between(300, 1700);
            let k = this.obstacles.create(x, y, Phaser.Math.RND.pick(kTypes));
            
            // Kaktus-Skalierung auf eine normale Größe
            k.setScale(0.4); 
            // Die Hitbox wird GANZ KLEIN gemacht (nur im Zentrum des Kaktus)
            k.body.setSize(100, 100); 
            k.refreshBody();
        }

        // Sheriff-Fix: Ganze Grafik ohne Zerschneiden
        this.player = this.physics.add.sprite(1000, 1000, 's_v').setScale(0.4);
        
        // Hitbox nur an den FÜSSEN (ganz klein), damit du überall durchkommst
        this.player.body.setSize(100, 50).setOffset(200, 450);
        this.player.setCollideWorldBounds(true);

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.physics.add.collider(this.player, this.obstacles);

        this.targetPoint = new Phaser.Math.Vector2(1000, 1000);
        this.input.on('pointerdown', (pointer) => {
            if (pointer.x > 270 && pointer.y > 540) return;
            const worldPoint = this.cameras.main.getWorldPoint(pointer.x, pointer.y);
            this.targetPoint.x = worldPoint.x;
            this.targetPoint.y = worldPoint.y;
            this.physics.moveToObject(this.player, this.targetPoint, 250);
        });
    }

    update() {
        let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.targetPoint.x, this.targetPoint.y);
        
        if (dist < 10) {
            this.player.body.reset(this.targetPoint.x, this.targetPoint.y);
        } else {
            // Richtung wecheln durch Tauschen des ganzen Bildes
            let angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, this.targetPoint.x, this.targetPoint.y);
            let deg = Phaser.Math.RadToDeg(angle);

            if (deg > -45 && deg <= 45) this.player.setTexture('s_r');
            else if (deg > 45 && deg <= 135) this.player.setTexture('s_v');
            else if (deg > -135 && deg <= -45) this.player.setTexture('s_h');
            else this.player.setTexture('s_l');
        }
        
        // Depth-Sortierung: Wer weiter "unten" ist, steht vorne
        this.player.setDepth(this.player.y);
        this.obstacles.getChildren().forEach(o => o.setDepth(o.y));
    }
}

const config = {
    type: Phaser.AUTO, width: 360, height: 640,
    physics: { 
        default: 'arcade',
        arcade: { debug: false } // Wir schalten Debug aus, damit die lila Linien weg sind
    },
    scene: [Overworld], pixelArt: true
};
const game = new Phaser.Game(config);
</script>
</body>
</html>
