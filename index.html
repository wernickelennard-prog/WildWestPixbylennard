<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheriff - Saloon Interior Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
// --- SZENE 1: AUSSENWELT ---
class Overworld extends Phaser.Scene {
    constructor() { super('Overworld'); }

    preload() {
        const fConfig = { frameWidth: 512, frameHeight: 512 };
        this.load.spritesheet('s_v', 'Sheriff_spritesheet-vorne.png', fConfig);
        this.load.spritesheet('s_h', 'Sheriff_spritesheet-hinten.png', fConfig);
        this.load.spritesheet('s_r', 'Sheriff_spritesheet-rechts.png', fConfig);
        this.load.spritesheet('s_l', 'Sheriff-spritesheet-links.png', fConfig);
        this.load.image('sand', 'Sand.png'); 
        this.load.image('k1', 'Kaktus-.png'); 
        this.load.image('saloon_ext', 'Saloon-.png');
    }

    create() {
        const worldSize = 4000;
        this.physics.world.setBounds(0, 0, worldSize, worldSize);
        this.add.tileSprite(worldSize/2, worldSize/2, worldSize, worldSize, 'sand').setTileScale(2.5);

        this.obstacles = this.physics.add.staticGroup();
        const sX = 3500, sY = 600;

        // Bessere Schatten-Verschmelzung: Ein dunkler "Dreck"-Bereich unter dem Haus
        this.add.rectangle(sX, sY + 320, 900, 80, 0x000000, 0.2).setOrigin(0.5);

        this.saloon = this.obstacles.create(sX, sY, 'saloon_ext').setScale(1.2).refreshBody();
        this.saloon.body.setSize(this.saloon.width, 250).setOffset(0, this.saloon.height - 250);

        // Tür-Trigger
        this.doorTrigger = this.add.rectangle(sX - 15, sY + 280, 100, 60, 0xff0000, 0); 
        this.physics.add.existing(this.doorTrigger, true);

        // Sheriff
        this.player = this.physics.add.sprite(worldSize/2, worldSize/2, 's_v', 1).setScale(0.25);
        this.player.body.setSize(120, 60).setOffset(196, 430);
        
        // Animationen (müssen in jeder Szene erstellt werden)
        this.createAnims();

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.physics.add.collider(this.player, this.obstacles);
        this.physics.add.overlap(this.player, this.doorTrigger, () => this.scene.start('SaloonInside'));

        // Zoom (Mausrad)
        this.input.on('wheel', (p, g, dx, dy) => {
            this.cameras.main.setZoom(Phaser.Math.Clamp(this.cameras.main.zoom - dy * 0.001, 0.4, 1.2));
        });

        this.target = new Phaser.Math.Vector2(this.player.x, this.player.y);
        this.input.on('pointerdown', (pointer) => {
            const p = this.cameras.main.getWorldPoint(pointer.x, pointer.y);
            this.target.copy(p);
            this.physics.moveToObject(this.player, this.target, 250);
            this.isMoving = true;
        });
    }

    createAnims() {
        const dirs = [{k:'v',s:'s_v'},{k:'h',s:'s_h'},{k:'r',s:'s_r'},{k:'l',s:'s_l'}];
        dirs.forEach(d => {
            if (!this.anims.exists('walk_' + d.k)) {
                this.anims.create({ key: 'walk_'+d.k, frames: this.anims.generateFrameNumbers(d.s, {start:0, end:2}), frameRate: 10, repeat: -1 });
            }
        });
    }

    update() {
        if (this.isMoving) {
            let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.target.x, this.target.y);
            if (dist < 10) {
                this.player.body.reset(this.target.x, this.target.y);
                this.player.anims.stop(); this.player.setFrame(1);
                this.isMoving = false;
            } else {
                let angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, this.target.x, this.target.y);
                let deg = Phaser.Math.RadToDeg(angle);
                if (deg > -45 && deg <= 45) this.player.play('walk_r', true);
                else if (deg > 45 && deg <= 135) this.player.play('walk_v', true);
                else if (deg > -135 && deg <= -45) this.player.play('walk_h', true);
                else this.player.play('walk_l', true);
            }
        }
        this.player.setDepth(this.player.y);
    }
}

// --- SZENE 2: SALOON INNEN ---
class SaloonInside extends Phaser.Scene {
    constructor() { super('SaloonInside'); }

    preload() {
        this.load.image('saloon_bg', 'imSaloon.png');
    }

    create() {
        // Hintergrund mittig platzieren
        const bg = this.add.image(400, 300, 'saloon_bg').setScale(1.2);
        
        // Grenzen der Szene (damit man nicht aus dem Bild läuft)
        this.physics.world.setBounds(50, 100, 700, 450);

        // Sheriff spawnt "an der Tür" (unten Mitte), aber ein Stück nach oben versetzt
        this.player = this.physics.add.sprite(400, 500, 's_h', 1).setScale(0.4);
        this.player.setCollideWorldBounds(true);
        this.player.body.setSize(120, 60).setOffset(196, 430);

        // Exit-Trigger (wenn man wieder ganz nach unten läuft)
        this.exitTrigger = this.add.rectangle(400, 580, 200, 40, 0x000000, 0);
        this.physics.add.existing(this.exitTrigger, true);
        this.physics.add.overlap(this.player, this.exitTrigger, () => this.scene.start('Overworld'));

        this.target = new Phaser.Math.Vector2(this.player.x, this.player.y);
        this.input.on('pointerdown', (pointer) => {
            this.target.copy(pointer);
            this.physics.moveToObject(this.player, this.target, 200);
            this.isMoving = true;
        });

        // Kamera ist hier fest (kein Zoom)
        this.cameras.main.fadeIn(500, 0, 0, 0);
    }

    update() {
        if (this.isMoving) {
            let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.target.x, this.target.y);
            if (dist < 10) {
                this.player.body.reset(this.target.x, this.target.y);
                this.player.anims.stop(); this.player.setFrame(1);
                this.isMoving = false;
            } else {
                let angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, this.target.x, this.target.y);
                let deg = Phaser.Math.RadToDeg(angle);
                if (deg > -45 && deg <= 45) this.player.play('walk_r', true);
                else if (deg > 45 && deg <= 135) this.player.play('walk_v', true);
                else if (deg > -135 && deg <= -45) this.player.play('walk_h', true);
                else this.player.play('walk_l', true);
            }
        }
    }
}

const config = {
    type: Phaser.AUTO, width: 800, height: 600,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: [Overworld, SaloonInside], pixelArt: true
};
const game = new Phaser.Game(config);
</script>
</body>
</html>
