<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheriff - Saloon & Piano Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
// Gemeinsame Einstellungen für die Animationen
const animsConfig = (scene) => {
    ['v', 'h', 'r', 'l'].forEach(d => {
        if (!scene.anims.exists('walk_'+d)) {
            scene.anims.create({ key: 'walk_'+d, frames: scene.anims.generateFrameNumbers('s_'+d, {start:0, end:2}), frameRate: 10, repeat: -1 });
            scene.anims.create({ key: 'shoot_'+d, frames: scene.anims.generateFrameNumbers('sh_'+d, {start:0, end:2}), frameRate: 15, repeat: 0 });
        }
    });
};

class Overworld extends Phaser.Scene {
    constructor() { super('Overworld'); }

    preload() {
        const fConfig = { frameWidth: 512, frameHeight: 512 };
        this.load.spritesheet('s_v', 'Sheriff_spritesheet-vorne.png', fConfig);
        this.load.spritesheet('s_h', 'Sheriff_spritesheet-hinten.png', fConfig);
        this.load.spritesheet('s_r', 'Sheriff_spritesheet-rechts.png', fConfig);
        this.load.spritesheet('s_l', 'Sheriff-spritesheet-links.png', fConfig);
        this.load.spritesheet('sh_v', 'Sheriff-spritesheet_Vschuss.png', fConfig);
        this.load.spritesheet('sh_h', 'Sheriff-Hschuss.png', fConfig);
        this.load.spritesheet('sh_r', 'Sheriff_spritesheet_Rschuss.png', fConfig);
        this.load.spritesheet('sh_l', 'Sheriff-spritesheet_Lschuss.png', fConfig);
        this.load.image('b_v', 'Kugel-V.png'); this.load.image('b_h', 'Kugel-H.png');
        this.load.image('b_r', 'Kugel-R.png'); this.load.image('b_l', 'Kugel-L.png');
        this.load.image('sand', 'Sand.png'); this.load.image('saloon_ext', 'Saloon-.png');
        this.load.image('k1', 'Kaktus-.png'); this.load.image('k2', 'Kaktus_anderer_art.png'); this.load.image('k3', 'Kaktus-Kugel.png');
    }

    create() {
        const worldSize = 4000;
        this.physics.world.setBounds(0, 0, worldSize, worldSize);
        this.add.tileSprite(worldSize/2, worldSize/2, worldSize, worldSize, 'sand').setTileScale(2.5);

        // Saloon-Verschmelzung (Dunkler Boden unter dem Haus)
        const sX = 3540, sY = 500;
        this.add.rectangle(sX, sY + 310, 1000, 120, 0x000000, 0.25).setOrigin(0.5);
        this.obstacles = this.physics.add.staticGroup();
        this.saloon = this.obstacles.create(sX, sY, 'saloon_ext').setScale(1.2).refreshBody();

        // Tür-Trigger vergrößert
        this.doorTrigger = this.add.rectangle(sX - 15, sY + 280, 150, 100, 0xff0000, 0);
        this.physics.add.existing(this.doorTrigger, true);

        this.bullets = this.physics.add.group();
        this.player = this.physics.add.sprite(2000, 2000, 's_v', 1).setScale(0.25);
        this.player.body.setSize(120, 60).setOffset(196, 430);
        this.currentDir = 'v';

        animsConfig(this);
        this.createShootButton();
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.physics.add.collider(this.player, this.obstacles);
        this.physics.add.overlap(this.player, this.doorTrigger, () => this.scene.start('SaloonInside'));

        // PC-Steuerung: Pfeiltasten & Leertaste
        this.cursors = this.input.keyboard.createCursorKeys();
        this.spaceBar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

        // Handy/Maus Laufen
        this.input.on('pointerdown', (p) => {
            if (p.x > 650 && p.y > 450) return;
            this.target = this.cameras.main.getWorldPoint(p.x, p.y);
            this.physics.moveToObject(this.player, this.target, 250);
            this.isMoving = true;
        });
    }

    createShootButton() {
        const btn = this.add.container(720, 520).setScrollFactor(0);
        const circle = this.add.circle(0, 0, 45, 0xdaa520, 1).setStrokeStyle(4, 0x8b4513).setInteractive();
        const core = this.add.circle(0, 0, 15, 0x333333); // "Zündhütchen" Optik
        btn.add([circle, core]);
        circle.on('pointerdown', () => { circle.setScale(0.9); this.shoot(); });
        circle.on('pointerup', () => circle.setScale(1));
    }

    shoot() {
        if (this.isShooting) return;
        this.isShooting = true;
        this.player.play('shoot_' + this.currentDir, true);
        const b = this.bullets.create(this.player.x, this.player.y, 'b_' + this.currentDir).setScale(0.6);
        const speeds = { r: [1000, 0], l: [-1000, 0], v: [0, 1000], h: [0, -1000] };
        b.body.setVelocity(...speeds[this.currentDir]);
        this.time.delayedCall(200, () => { this.isShooting = false; });
        this.time.delayedCall(1000, () => b.destroy());
    }

    update() {
        // PC Bewegung Priorität
        if (this.cursors.left.isDown) { this.player.setVelocityX(-250); this.player.play('walk_l', true); this.currentDir = 'l'; this.isMoving = false; }
        else if (this.cursors.right.isDown) { this.player.setVelocityX(250); this.player.play('walk_r', true); this.currentDir = 'r'; this.isMoving = false; }
        else if (this.cursors.up.isDown) { this.player.setVelocityY(-250); this.player.play('walk_h', true); this.currentDir = 'h'; this.isMoving = false; }
        else if (this.cursors.down.isDown) { this.player.setVelocityY(250); this.player.play('walk_v', true); this.currentDir = 'v'; this.isMoving = false; }
        else if (!this.isMoving) { this.player.setVelocity(0); this.player.anims.stop(); this.player.setFrame(1); }

        if (Phaser.Input.Keyboard.JustDown(this.spaceBar)) this.shoot();

        // Maus-Bewegung Logik (wenn keine Tasten gedrückt)
        if (this.isMoving && !this.isShooting) {
            let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.target.x, this.target.y);
            if (dist < 10) { this.player.body.reset(this.target.x, this.target.y); this.isMoving = false; }
            else {
                let angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, this.target.x, this.target.y);
                let deg = Phaser.Math.RadToDeg(angle);
                if (deg > -45 && deg <= 45) { this.player.play('walk_r', true); this.currentDir = 'r'; }
                else if (deg > 45 && deg <= 135) { this.player.play('walk_v', true); this.currentDir = 'v'; }
                else if (deg > -135 && deg <= -45) { this.player.play('walk_h', true); this.currentDir = 'h'; }
                else { this.player.play('walk_l', true); this.currentDir = 'l'; }
            }
        }
        this.player.setDepth(this.player.y);
    }
}

class SaloonInside extends Phaser.Scene {
    constructor() { super('SaloonInside'); }
    preload() {
        this.load.image('saloon_bg', 'imSaloon.png');
        // Echte Klavier Sounds (Beispiel URLs, da du keine Dateien geschickt hast)
        this.load.audio('piano', 'https://actions.google.com/sounds/v1/science_fiction/beep_zap.ogg'); 
    }
    create() {
        this.add.image(400, 300, 'saloon_bg').setScale(1.2);
        this.physics.world.setBounds(100, 280, 600, 300);
        this.player = this.physics.add.sprite(400, 315, 's_v', 1).setScale(0.4);
        this.player.setCollideWorldBounds(true);
        this.player.body.setSize(120, 60).setOffset(196, 430);

        // Klavier Position (Beispielhaft bei x:200, y:350)
        this.piano = this.add.rectangle(200, 350, 100, 80, 0x000000, 0);
        this.physics.add.existing(this.piano, true);

        this.pianoBtn = this.add.container(200, 280).setVisible(false);
        this.pianoBtn.add([
            this.add.circle(0, 0, 25, 0xffd700).setInteractive(),
            this.add.text(0, 0, '♫', {fontSize:'20px', color:'#000'}).setOrigin(0.5)
        ]);

        this.pianoBtn.getAt(0).on('pointerdown', () => { this.sound.play('piano'); });

        this.exitTrigger = this.add.rectangle(400, 290, 100, 40, 0x00ff00, 0);
        this.physics.add.existing(this.exitTrigger, true);
        this.physics.add.overlap(this.player, this.exitTrigger, () => this.scene.start('Overworld'));

        this.cursors = this.input.keyboard.createCursorKeys();
        this.target = new Phaser.Math.Vector2(this.player.x, this.player.y);
        this.input.on('pointerdown', (p) => { this.target.copy(p); this.physics.moveToObject(this.player, this.target, 200); this.isMoving = true; });
    }
    update() {
        // Klavier Button Sichtbarkeit
        let distToPiano = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.piano.x, this.piano.y);
        this.pianoBtn.setVisible(distToPiano < 100);
        
        // (Bewegungs-Logik wie oben)
        if (this.cursors.left.isDown) this.player.setVelocityX(-200);
        else if (this.cursors.right.isDown) this.player.setVelocityX(200);
        else if (this.cursors.up.isDown) this.player.setVelocityY(-200);
        else if (this.cursors.down.isDown) this.player.setVelocityY(200);
        else if (!this.isMoving) this.player.setVelocity(0);
    }
}

const config = {
    type: Phaser.AUTO, width: 800, height: 600,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: [Overworld, SaloonInside], pixelArt: true
};
new Phaser.Game(config);
</script>
</body>
</html>
