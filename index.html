<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheriff - Fix & Cave Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
function createGlobalAnims(scene) {
    const dirs = ['v', 'h', 'r', 'l'];
    dirs.forEach(d => {
        if (!scene.anims.exists('walk_' + d)) {
            scene.anims.create({
                key: 'walk_' + d,
                frames: scene.anims.generateFrameNumbers('s_' + d, { start: 0, end: 2 }),
                frameRate: 10, repeat: -1
            });
        }
        if (!scene.anims.exists('shoot_' + d)) {
            scene.anims.create({
                key: 'shoot_' + d,
                frames: scene.anims.generateFrameNumbers('sh_' + d, { start: 0, end: 2 }),
                frameRate: 15, repeat: 0
            });
        }
    });
}

class Overworld extends Phaser.Scene {
    constructor() { super('Overworld'); }

    preload() {
        const fConfig = { frameWidth: 512, frameHeight: 512 };
        this.load.spritesheet('s_v', 'Sheriff_spritesheet-vorne.png', fConfig);
        this.load.spritesheet('s_h', 'Sheriff_spritesheet-hinten.png', fConfig);
        this.load.spritesheet('s_r', 'Sheriff_spritesheet-rechts.png', fConfig);
        this.load.spritesheet('s_l', 'Sheriff-spritesheet-links.png', fConfig);
        this.load.spritesheet('sh_v', 'Sheriff-spritesheet_Vschuss.png', fConfig);
        this.load.spritesheet('sh_h', 'Sheriff-Hschuss.png', fConfig);
        this.load.spritesheet('sh_r', 'Sheriff_spritesheet_Rschuss.png', fConfig);
        this.load.spritesheet('sh_l', 'Sheriff-spritesheet_Lschuss.png', fConfig);
        this.load.image('b_v', 'Kugel-V.png'); this.load.image('b_h', 'Kugel-H.png');
        this.load.image('b_r', 'Kugel-R.png'); this.load.image('b_l', 'Kugel-L.png');
        
        // Sand Texturen
        this.load.image('sand0', 'Sand.png');
        this.load.image('sand1', 'Sand-Anders1.png');
        this.load.image('sand2', 'Sand-Anders2.png');
        this.load.image('stein', 'Stein-1.png');
        this.load.image('k1', 'Kaktus-.png'); this.load.image('k2', 'Kaktus_anderer_art.png'); this.load.image('k3', 'Kaktus-Kugel.png');
        this.load.image('saloon_ext', 'Saloon-.png');
        this.load.image('cave_ent', 'Höhleneingang-.png');
    }

    create() {
        const worldSize = 4000;
        const tileSize = 512; // Die Größe deiner Sand-Bilder
        this.physics.world.setBounds(0, 0, worldSize, worldSize);

        // Boden kacheln (Sand-Mix)
        for(let x = 0; x < worldSize; x += tileSize) {
            for(let y = 0; y < worldSize; y += tileSize) {
                let key = 'sand' + Phaser.Math.Between(0, 2);
                this.add.image(x, y, key).setOrigin(0).setDepth(-10);
            }
        }

        this.obstacles = this.physics.add.staticGroup();
        this.bullets = this.physics.add.group();

        // Saloon & Höhle
        this.saloon = this.obstacles.create(3500, 500, 'saloon_ext').setScale(1.2).refreshBody();
        this.caveEnt = this.obstacles.create(500, 500, 'cave_ent').setScale(1.0).refreshBody();

        // Deko (Steine & Kakteen)
        for(let i = 0; i < 150; i++) {
            let rx = Phaser.Math.Between(100, 3900);
            let ry = Phaser.Math.Between(100, 3900);
            if (Phaser.Math.Distance.Between(rx, ry, 3500, 500) > 500 && Phaser.Math.Distance.Between(rx, ry, 500, 500) > 300) {
                let type = Phaser.Math.RND.pick(['stein', 'k1', 'k2', 'k3']);
                let item = this.obstacles.create(rx, ry, type);
                item.setScale(type === 'stein' ? 0.4 : 0.25).refreshBody();
            }
        }

        this.player = this.physics.add.sprite(2000, 2000, 's_v', 1).setScale(0.25);
        this.player.body.setSize(120, 60).setOffset(196, 430);
        this.currentDir = 'v';

        createGlobalAnims(this);
        this.setupCameraControls();
        
        this.physics.add.collider(this.player, this.obstacles);
        this.physics.add.overlap(this.player, this.caveEnt, () => this.scene.start('CaveScene'));

        // Feuer Button
        this.createShootBtn();
    }

    setupCameraControls() {
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.cursors = this.input.keyboard.createCursorKeys();
        
        // Zoom (Mausrad & Pinch)
        this.input.on('wheel', (p, g, dx, dy) => {
            this.cameras.main.setZoom(Phaser.Math.Clamp(this.cameras.main.zoom - dy * 0.001, 0.4, 1.2));
        });

        this.input.on('pointerdown', (p) => {
            if (p.x > 600 && p.y > 400) return;
            this.target = this.cameras.main.getWorldPoint(p.x, p.y);
            this.physics.moveToObject(this.player, this.target, 150); // Speed auf 150 gesetzt
            this.isMoving = true;
        });
    }

    createShootBtn() {
        const btn = this.add.container(720, 520).setScrollFactor(0).setDepth(2000);
        const circle = this.add.circle(0, 0, 40, 0xcd7f32).setStrokeStyle(4, 0x8b4513).setInteractive();
        btn.add([circle, this.add.text(0, 0, 'SHOT', { fontFamily: '"Pixelify Sans"', fontSize: '18px' }).setOrigin(0.5)]);
        circle.on('pointerdown', () => this.shoot());
        this.input.keyboard.on('keydown-SPACE', () => this.shoot());
    }

    shoot() {
        if (this.isShooting) return;
        this.isShooting = true;
        this.player.play('shoot_' + this.currentDir, true);
        const b = this.bullets.create(this.player.x, this.player.y, 'b_' + this.currentDir).setScale(0.15);
        const v = { r:[800,0], l:[-800,0], v:[0,800], h:[0,-800] }[this.currentDir];
        b.body.setVelocity(v[0], v[1]);
        this.time.delayedCall(200, () => this.isShooting = false);
        this.time.delayedCall(1000, () => b.destroy());
    }

    update() {
        this.player.setDepth(this.player.y);
        if (this.isShooting) return;

        let moving = false;
        if (this.cursors.left.isDown) { this.player.setVelocityX(-150); this.currentDir = 'l'; moving = true; }
        else if (this.cursors.right.isDown) { this.player.setVelocityX(150); this.currentDir = 'r'; moving = true; }
        else if (this.cursors.up.isDown) { this.player.setVelocityY(-150); this.currentDir = 'h'; moving = true; }
        else if (this.cursors.down.isDown) { this.player.setVelocityY(150); this.currentDir = 'v'; moving = true; }

        if (moving) { this.player.play('walk_' + this.currentDir, true); this.isMoving = false; }
        else if (!this.isMoving) { this.player.setVelocity(0); this.player.anims.stop(); this.player.setFrame(1); }
    }
}

class CaveScene extends Phaser.Scene {
    constructor() { super('CaveScene'); }
    preload() {
        this.load.image('c_wall', 'HöhlenWand-.png');
        this.load.image('c_floor1', 'HöhlenBoden1-.png');
        this.load.image('c_floor2', 'HöhlenBoden2-.png');
        this.load.image('gold', 'GoldErz-.png');
        this.load.image('iron', 'EisenErz-.png');
        this.load.image('coal', 'KohleErz-.png');
    }
    create() {
        const caveW = 1200, caveH = 800;
        this.physics.world.setBounds(0, 0, caveW, caveH);

        // Höhlenboden mischen
        for(let x = 0; x < caveW; x += 256) {
            for(let y = 0; y < caveH; y += 256) {
                let fKey = Phaser.Math.Between(0, 1) === 0 ? 'c_floor1' : 'c_floor2';
                this.add.image(x, y, fKey).setOrigin(0);
            }
        }

        // Höhlenwand oben
        for(let x = 0; x < caveW; x += 512) {
            this.add.image(x, 0, 'c_wall').setOrigin(0).setDepth(5);
        }

        this.ores = this.physics.add.staticGroup();
        ['gold', 'iron', 'coal'].forEach(t => {
            for(let i=0; i<5; i++) {
                this.ores.create(Phaser.Math.Between(100, 1100), Phaser.Math.Between(150, 700), t).setScale(0.6).refreshBody();
            }
        });

        this.player = this.physics.add.sprite(600, 600, 's_h', 1).setScale(0.4);
        createGlobalAnims(this);
        this.cameras.main.startFollow(this.player);
        this.physics.add.collider(this.player, this.ores);

        // Exit
        this.exit = this.add.rectangle(600, 780, 200, 40, 0, 0);
        this.physics.add.existing(this.exit, true);
        this.physics.add.overlap(this.player, this.exit, () => this.scene.start('Overworld'));
        
        this.cursors = this.input.keyboard.createCursorKeys();
    }
    update() {
        this.player.setVelocity(0);
        if (this.cursors.left.isDown) { this.player.setVelocityX(-150); this.player.play('walk_l', true); }
        else if (this.cursors.right.isDown) { this.player.setVelocityX(150); this.player.play('walk_r', true); }
        else if (this.cursors.up.isDown) { this.player.setVelocityY(-150); this.player.play('walk_h', true); }
        else if (this.cursors.down.isDown) { this.player.setVelocityY(150); this.player.play('walk_v', true); }
        else { this.player.anims.stop(); this.player.setFrame(1); }
    }
}

const config = {
    type: Phaser.AUTO, width: 800, height: 600,
    physics: { default: 'arcade' },
    scene: [Overworld, CaveScene], pixelArt: true
};
new Phaser.Game(config);
</script>
</body>
</html>
