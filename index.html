<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheriff - Saloon Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
class Overworld extends Phaser.Scene {
    constructor() { super('Overworld'); }

    preload() {
        const fConfig = { frameWidth: 512, frameHeight: 512 };
        this.load.spritesheet('s_v', 'Sheriff_spritesheet-vorne.png', fConfig);
        this.load.spritesheet('s_h', 'Sheriff_spritesheet-hinten.png', fConfig);
        this.load.spritesheet('s_r', 'Sheriff_spritesheet-rechts.png', fConfig);
        this.load.spritesheet('s_l', 'Sheriff-spritesheet-links.png', fConfig);

        this.load.image('sand', 'Sand.png'); 
        this.load.image('k1', 'Kaktus-.png'); 
        this.load.image('k2', 'Kaktus_anderer_art.png');
        this.load.image('k3', 'Kaktus-Kugel.png');
        this.load.image('saloon', 'Saloon-.png');
    }

    create() {
        const worldSize = 4000;
        this.physics.world.setBounds(0, 0, worldSize, worldSize);

        // Boden
        this.add.tileSprite(worldSize/2, worldSize/2, worldSize, worldSize, 'sand').setTileScale(2.5);

        this.obstacles = this.physics.add.staticGroup();

        // --- SALOON FIX ---
        // 1. Viel größer skalieren (1.5 statt 0.8)
        // 2. Position etwas tiefer, damit er "im Sand" steht
        const saloonX = 3500;
        const saloonY = 500;
        this.saloonBuilding = this.obstacles.create(saloonX, saloonY, 'saloon').setScale(1.8).refreshBody();
        
        // Schatten/Dreck unter dem Saloon, um den Boden-Übergang zu glätten
        let saloonBase = this.add.rectangle(saloonX, saloonY + 350, 800, 100, 0x000000, 0.3).setOrigin(0.5);
        
        // Saloon-Hitbox: Nur der untere Teil ist solide, damit der Sheriff "vor" dem Haus laufen kann
        this.saloonBuilding.body.setSize(this.saloonBuilding.width, 300);
        this.saloonBuilding.body.setOffset(0, this.saloonBuilding.height - 300);

        // TÜRAUSLÖSER (Größerer Bereich vor der Tür)
        this.doorTrigger = this.add.rectangle(saloonX - 20, saloonY + 380, 150, 100, 0xff0000, 0); 
        this.physics.add.existing(this.doorTrigger, true);

        // Kakteen (weniger, damit es ordentlicher aussieht)
        for(let i = 0; i < 40; i++) {
            let x = Phaser.Math.Between(200, worldSize - 800);
            let y = Phaser.Math.Between(200, worldSize - 200);
            let k = this.obstacles.create(x, y, Phaser.Math.RND.pick(['k1','k2','k3']));
            k.setScale(0.35).refreshBody();
            k.body.setSize(60, 60).setOffset(k.width/2-30, k.height-80);
        }

        // --- SHERIFF FIX ---
        // Ein bisschen kleiner (0.25 statt 0.3), damit das Haus massiver wirkt
        this.player = this.physics.add.sprite(worldSize/2, worldSize/2, 's_v', 1).setScale(0.25);
        this.player.body.setSize(120, 60).setOffset(196, 430);
        this.player.setCollideWorldBounds(true);

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.physics.add.collider(this.player, this.obstacles);

        // Überlappung mit der Tür
        this.physics.add.overlap(this.player, this.doorTrigger, () => this.enterSaloon());

        this.targetPoint = new Phaser.Math.Vector2(this.player.x, this.player.y);
        this.isMoving = false;

        this.input.on('pointerdown', (pointer) => {
            if (this.isEntering) return;
            const worldPoint = this.cameras.main.getWorldPoint(pointer.x, pointer.y);
            this.targetPoint.x = worldPoint.x;
            this.targetPoint.y = worldPoint.y;
            this.physics.moveToObject(this.player, this.targetPoint, 250);
            this.isMoving = true;
        });
    }

    enterSaloon() {
        if (!this.isEntering) {
            this.isEntering = true;
            this.player.body.stop();
            this.cameras.main.fadeOut(1000, 0, 0, 0);
            this.add.text(this.player.x, this.player.y - 120, "Öffne Tür...", { 
                fontSize: '24px', fill: '#fbff00', fontStyle: 'bold', stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5);
        }
    }

    update() {
        if (this.isMoving && !this.isEntering) {
            let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.targetPoint.x, this.targetPoint.y);
            if (dist < 10) {
                this.player.body.reset(this.targetPoint.x, this.targetPoint.y);
                this.player.anims.stop();
                this.player.setFrame(1);
                this.isMoving = false;
            } else {
                let angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, this.targetPoint.x, this.targetPoint.y);
                let deg = Phaser.Math.RadToDeg(angle);
                if (deg > -45 && deg <= 45) this.player.play('walk_r', true);
                else if (deg > 45 && deg <= 135) this.player.play('walk_v', true);
                else if (deg > -135 && deg <= -45) this.player.play('walk_h', true);
                else this.player.play('walk_l', true);
            }
        }
        this.player.setDepth(this.player.y);
        this.obstacles.getChildren().forEach(o => o.setDepth(o.y));
    }
}

const config = {
    type: Phaser.AUTO, width: 360, height: 640,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: [Overworld], pixelArt: true
};
const game = new Phaser.Game(config);
</script>
</body>
</html>
