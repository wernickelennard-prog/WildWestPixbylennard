<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild West Sheriff - Next Level</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
class Overworld extends Phaser.Scene {
    constructor() {
        super('Overworld');
    }

    preload() {
        this.load.image('sheriff', 'Sheriff.png');
        this.load.image('sand', 'Sand.png'); 
        this.load.image('kaktus', 'Kaktus.png');
    }

    create() {
        // 1. WELT-GRÖSSE (Wir machen die Welt größer als den Bildschirm)
        const worldWidth = 1000;
        const worldHeight = 1000;
        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

        // 2. BODEN
        this.background = this.add.tileSprite(worldWidth/2, worldHeight/2, worldWidth, worldHeight, 'sand');
        this.background.setTileScale(2.5); 

        // 3. SCHATTEN-GRUPPE (Einfache graue Kreise unter den Objekten)
        this.shadows = this.add.group();

        // 4. HINDERNISSE
        this.obstacles = this.physics.add.staticGroup();
        
        // Wir platzieren Kakteen und geben ihnen Schatten
        const kaktusPositions = [
            {x: 200, y: 300}, {x: 500, y: 200}, {x: 800, y: 600}, {x: 300, y: 800}
        ];

        kaktusPositions.forEach(pos => {
            // Schatten unter Kaktus
            let s = this.add.ellipse(pos.x, pos.y + 40, 60, 20, 0x000000, 0.2);
            this.obstacles.create(pos.x, pos.y, 'kaktus').setScale(2).refreshBody();
        });

        // 5. DER SHERIFF & SEIN SCHATTEN
        this.playerShadow = this.add.ellipse(0, 0, 40, 15, 0x000000, 0.3);
        this.player = this.physics.add.sprite(500, 500, 'sheriff').setScale(0.2);
        this.player.setCollideWorldBounds(true);

        // Präzise Hitbox
        this.player.body.setSize(this.player.width * 0.5, this.player.height * 0.2);
        this.player.body.setOffset(this.player.width * 0.25, this.player.height * 0.8);

        this.physics.add.collider(this.player, this.obstacles);

        // 6. KAMERA (Folgt dem Sheriff)
        this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

        this.targetPoint = new Phaser.Math.Vector2(500, 500);

        // 7. STEUERUNG
        this.input.on('pointerdown', (pointer) => {
            // Umrechnung von Bildschirm-Klick zu Welt-Position
            const worldPoint = this.cameras.main.getWorldPoint(pointer.x, pointer.y);
            this.targetPoint.x = worldPoint.x;
            this.targetPoint.y = worldPoint.y;
            this.physics.moveToObject(this.player, this.targetPoint, 200);
        });
    }

    update() {
        // Schatten dem Spieler folgen lassen
        this.playerShadow.x = this.player.x;
        this.playerShadow.y = this.player.y + 45;

        // Stopp-Logik
        let distance = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.targetPoint.x, this.targetPoint.y);
        if (this.player.body.speed > 0 && distance < 10) {
            this.player.body.reset(this.targetPoint.x, this.targetPoint.y);
        }

        // Tiefen-Sortierung
        this.player.setDepth(this.player.y);
        this.playerShadow.setDepth(this.player.y - 1);
        this.obstacles.getChildren().forEach(kaktus => {
            kaktus.setDepth(kaktus.y);
        });
    }
}

const config = {
    type: Phaser.AUTO,
    width: 360,
    height: 640,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: [Overworld],
    pixelArt: true
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
